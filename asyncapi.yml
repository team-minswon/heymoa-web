asyncapi: 3.0.0
info:
  title: Heymoa Realtime Transcription API
  version: 1.0.0
  description: |
    브라우저와 Heymoa 서버 사이의 실시간 전사 WebSocket 계약이다.
    브라우저는 access_token cookie와 허용된 Origin으로 연결해야 한다.
    서버는 연결 준비에 최대 1분, OpenAI 연결 준비에 최대 5초를 기다린다.
    stop 수신 후 남은 final을 최대 10초간 drain하며, 오디오가 15초 쌓이면
    브라우저 command가 없어도 강제로 commit한다.
defaultContentType: application/json
servers:
  production:
    host: api.heymoa.com
    pathname: /
    protocol: wss
    description: |
      운영 WebSocket endpoint. HTTP upgrade 요청에는 access_token cookie와
      서버 CORS allowlist에 포함된 Origin header가 모두 필요하다.
    security:
      - $ref: '#/components/securitySchemes/accessCookie'
channels:
  transcriptionSession:
    address: /ws/transcription-sessions/{sessionId}
    title: 실시간 전사 세션
    description: |
      하나의 전사 세션에서 binary PCM frame과 JSON command를 받고 JSON event를 보낸다.
      정상 완료는 completed event 후 close code 1000, 잘못된 client frame/command는
      error event 후 1008, upstream 또는 내부 실패는 error event 후 1011로 종료한다.
    parameters:
      sessionId:
        $ref: '#/components/parameters/sessionId'
    messages:
      PcmAudio:
        $ref: '#/components/messages/PcmAudio'
      CommitCommand:
        $ref: '#/components/messages/CommitCommand'
      StopCommand:
        $ref: '#/components/messages/StopCommand'
      ConnectedEvent:
        $ref: '#/components/messages/ConnectedEvent'
      PartialEvent:
        $ref: '#/components/messages/PartialEvent'
      FinalEvent:
        $ref: '#/components/messages/FinalEvent'
      CompletedEvent:
        $ref: '#/components/messages/CompletedEvent'
      ErrorEvent:
        $ref: '#/components/messages/ErrorEvent'
operations:
  receiveTranscriptionInput:
    action: receive
    title: 오디오와 제어 command 수신
    summary: 브라우저가 PCM 오디오 또는 commit/stop command를 보낸다.
    channel:
      $ref: '#/channels/transcriptionSession'
    messages:
      - $ref: '#/channels/transcriptionSession/messages/PcmAudio'
      - $ref: '#/channels/transcriptionSession/messages/CommitCommand'
      - $ref: '#/channels/transcriptionSession/messages/StopCommand'
  sendTranscriptionEvent:
    action: send
    title: 전사 상태와 결과 전송
    summary: 서버가 연결 상태, partial/final 전사와 terminal event를 보낸다.
    description: |
      partial.text는 utteranceId별 누적 snapshot이므로 같은 utteranceId의 표시를 교체한다.
      final은 DB transaction commit 성공 후에만 전송되며 sequence 오름차순으로 전달된다.
    channel:
      $ref: '#/channels/transcriptionSession'
    messages:
      - $ref: '#/channels/transcriptionSession/messages/ConnectedEvent'
      - $ref: '#/channels/transcriptionSession/messages/PartialEvent'
      - $ref: '#/channels/transcriptionSession/messages/FinalEvent'
      - $ref: '#/channels/transcriptionSession/messages/CompletedEvent'
      - $ref: '#/channels/transcriptionSession/messages/ErrorEvent'
components:
  securitySchemes:
    accessCookie:
      type: httpApiKey
      name: access_token
      in: cookie
      description: 로그인 시 발급된 access token cookie
  parameters:
    sessionId:
      description: 연결할 전사 세션의 13자리 TSID
      location: $message.header#/sessionId
      examples:
        - 0HZX2K7M9Q4AB
  messages:
    PcmAudio:
      name: PcmAudio
      title: PCM 오디오 frame
      summary: signed PCM16, 24 kHz, mono, little-endian binary frame
      contentType: application/octet-stream
      payload:
        type: string
        format: binary
        minLength: 2
        maxLength: 1048576
        description: 비어 있지 않은 짝수 byte 크기의 PCM16 frame. 최대 1 MiB이다.
    CommitCommand:
      name: CommitCommand
      title: 현재 오디오 구간 확정
      payload:
        type: object
        additionalProperties: false
        required: [type]
        properties:
          type:
            type: string
            enum: [commit]
            description: 현재 non-empty audio buffer를 전사하도록 확정한다.
      examples:
        - name: commit
          payload:
            type: commit
    StopCommand:
      name: StopCommand
      title: 전사 세션 정상 종료
      payload:
        type: object
        additionalProperties: false
        required: [type]
        properties:
          type:
            type: string
            enum: [stop]
            description: 새 오디오 전송을 끝내고 pending final을 처리한 뒤 종료한다.
      examples:
        - name: stop
          payload:
            type: stop
    ConnectedEvent:
      name: ConnectedEvent
      title: 전사 연결 준비 완료
      payload:
        type: object
        additionalProperties: false
        required: [type, sessionId]
        properties:
          type:
            type: string
            enum: [connected]
          sessionId:
            $ref: '#/components/schemas/Tsid'
      examples:
        - name: connected
          payload:
            type: connected
            sessionId: 0HZX2K7M9Q4AB
    PartialEvent:
      name: PartialEvent
      title: 진행 중인 누적 전사
      summary: 같은 utteranceId의 이전 partial 표시를 이 snapshot으로 교체한다.
      payload:
        type: object
        additionalProperties: false
        required: [type, utteranceId, text]
        properties:
          type:
            type: string
            enum: [partial]
          utteranceId:
            $ref: '#/components/schemas/Tsid'
          text:
            type: string
            minLength: 1
            example: 오늘 회의에서는
      examples:
        - name: partial
          payload:
            type: partial
            utteranceId: 0HZX2K7M9Q4AC
            text: 오늘 회의에서는
    FinalEvent:
      name: FinalEvent
      title: 저장이 완료된 확정 전사 segment
      summary: DB 저장 성공 후 sequence 오름차순으로 전송된다.
      payload:
        type: object
        additionalProperties: false
        required: [type, segmentId, utteranceId, sequence, text, startedAtMs, endedAtMs]
        properties:
          type:
            type: string
            enum: [final]
          segmentId:
            $ref: '#/components/schemas/Tsid'
          utteranceId:
            $ref: '#/components/schemas/Tsid'
          sequence:
            type: integer
            format: int64
            minimum: 1
            example: 1
          text:
            type: string
            minLength: 1
            example: 오늘 회의에서는 출시 일정을 논의했습니다.
          startedAtMs:
            type: integer
            format: int64
            minimum: 0
            example: 0
          endedAtMs:
            type: integer
            format: int64
            minimum: 0
            example: 8230
      examples:
        - name: final
          payload:
            type: final
            segmentId: 0HZX2K7M9Q4AD
            utteranceId: 0HZX2K7M9Q4AC
            sequence: 1
            text: 오늘 회의에서는 출시 일정을 논의했습니다.
            startedAtMs: 0
            endedAtMs: 8230
    CompletedEvent:
      name: CompletedEvent
      title: 전사 세션 정상 완료
      payload:
        type: object
        additionalProperties: false
        required: [type, sessionId]
        properties:
          type:
            type: string
            enum: [completed]
          sessionId:
            $ref: '#/components/schemas/Tsid'
      examples:
        - name: completed
          payload:
            type: completed
            sessionId: 0HZX2K7M9Q4AB
    ErrorEvent:
      name: ErrorEvent
      title: 전사 세션 실패
      summary: event 전송 후 원인에 따라 WebSocket close code 1008 또는 1011로 종료한다.
      payload:
        type: object
        additionalProperties: false
        required: [type, code, message]
        properties:
          type:
            type: string
            enum: [error]
          code:
            type: string
            enum:
              - INVALID_CLIENT_MESSAGE
              - INVALID_AUDIO_FRAME
              - OPENAI_CONNECTION_FAILED
              - OPENAI_TRANSCRIPTION_FAILED
              - INTERNAL_ERROR
            example: OPENAI_TRANSCRIPTION_FAILED
          message:
            type: string
            minLength: 1
            example: 실시간 전사 처리에 실패했습니다.
      examples:
        - name: upstreamFailure
          payload:
            type: error
            code: OPENAI_TRANSCRIPTION_FAILED
            message: 실시간 전사 처리에 실패했습니다.
  schemas:
    Tsid:
      type: string
      pattern: '^[0-9A-HJKMNP-TV-Z]{13}$'
      minLength: 13
      maxLength: 13
      example: 0HZX2K7M9Q4AB
