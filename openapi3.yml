            application/json:
              schema:
                $ref: "#/components/schemas/AppErrorResponse"
              examples:
                PROJECT_NOT_FOUND:
                  value:
                    success: false
                    data: null
                    error:
                      code: "PROJECT_NOT_FOUND"
                      message: "프로젝트를 찾을 수 없습니다."
                      details: null
                WORKSPACE_NOT_FOUND:
                  value:
                    success: false
                    data: null
                    error:
                      code: "WORKSPACE_NOT_FOUND"
                      message: "워크스페이스를 찾을 수 없습니다."
                      details: null
                NOTE_NOT_FOUND:
                  value:
                    success: false
                    data: null
                    error:
                      code: "NOTE_NOT_FOUND"
                      message: "노트를 찾을 수 없습니다."
                      details: null
        "400":
          description: "잘못된 요청"
          content:
            application/json:
              schema:
