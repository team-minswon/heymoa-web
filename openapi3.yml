    post:
      tags:
      - "NoteSharedChat"
      summary: "공유 챗봇 메시지 전송 (SSE 중계)"
      description: "공유 챗봇에 메시지를 보내고 응답을 SSE(text/event-stream)로 passthrough한다. 이벤트\
        \ 페이로드 계약은 AsyncAPI(asyncapi-web-server.yml) 참고. 게이트는 스트림을 열기 전에 동기 검증한다 —\
        \ 접근할 수 없는 노트면 404, 녹음이 진행 중(IN_PROGRESS + 시작자 존재)이 아니면 409(MEETING_NOT_ACTIVE),\
        \ 다른 멤버가 입력 중이면 409(CHAT_LOCKED). 입력 잠금은 요청 시작에 획득하고 스트림 종료 시 해제하며 TTL은 300초\
        다."
      operationId: "sendNoteSharedChatMessage"
      parameters:
      - name: "noteId"
        in: "path"
        description: "노트의 13자리 TSID"
        required: true
        schema:
          type: "string"
          description: "노트의 13자리 TSID"
          nullable: false
          pattern: "^[0-9A-HJKMNP-TV-Z]{13}$"
          minLength: 13
          maxLength: 13
        example: "0HZX2K7M9Q4AF"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendNoteSharedChatMessageRequest"
            examples:
              sendNoteSharedChatMessage_WorkspaceNotFoundException:
                value:
                  message: "방금 논의한 배포 이슈 요약해줘"
              sendNoteSharedChatMessage_NoteNotFoundException:
                value:
                  message: "방금 논의한 배포 이슈 요약해줘"
              sendNoteSharedChatMessage_Success:
                value:
                  message: "방금 논의한 배포 이슈 요약해줘"
              sendNoteSharedChatMessage_MeetingNotActiveException:
                value:
                  message: "방금 논의한 배포 이슈 요약해줘"
              sendNoteSharedChatMessage_BadRequest:
                value:
                  message: "   "
              sendNoteSharedChatMessage_ProjectNotFoundException:
                value:
                  message: "방금 논의한 배포 이슈 요약해줘"
              sendNoteSharedChatMessage_ChatLockedException:
                value:
                  message: "방금 논의한 배포 이슈 요약해줘"
      responses:
        "404":
          description: "요청한 리소스를 찾을 수 없음"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppErrorResponse"
              examples:
                WORKSPACE_NOT_FOUND:
                  value:
                    success: false
                    data: null
                    error:
                      code: "WORKSPACE_NOT_FOUND"
                      message: "워크스페이스를 찾을 수 없습니다."
                      details: null
                NOTE_NOT_FOUND:
                  value:
                    success: false
                    data: null
                    error:
                      code: "NOTE_NOT_FOUND"
                      message: "노트를 찾을 수 없습니다."
                      details: null
                PROJECT_NOT_FOUND:
                  value:
                    success: false
                    data: null
                    error:
                      code: "PROJECT_NOT_FOUND"
                      message: "프로젝트를 찾을 수 없습니다."
                      details: null
        "200":
          description: "요청 성공"
          content:
            text/event-stream:
              schema:
                type: "string"
                description: "SSE 이벤트 스트림. 이벤트별 payload는 AsyncAPI 계약을 따른다."
              examples:
                sendNoteSharedChatMessage_Success:
                  value: "event:message_start\ndata:{\"chatId\":\"0K9GVJT2C4Q2A\"\
                    ,\"messageId\":\"0K9GVJT2C4Q4C\"}\n\nevent:token\ndata:{\"delta\"\
                    :\"배포\"}\n\nevent:message_end\ndata:{\"messageId\":\"0K9GVJT2C4Q4C\"\
                    ,\"content\":\"배포 관련 논의 요약입니다...\"}\n\n"
        "409":
          description: "요청 상태 충돌"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppErrorResponse"
              examples:
                MEETING_NOT_ACTIVE:
                  value:
                    success: false
                    data: null
                    error:
                      code: "MEETING_NOT_ACTIVE"
                      message: "녹음 중에만 공유 챗봇을 사용할 수 있습니다."
                      details: null
                CHAT_LOCKED:
                  value:
                    success: false
                    data: null
                    error:
                      code: "CHAT_LOCKED"
                      message: "다른 멤버가 입력 중입니다."
                      details: null
        "400":
          description: "잘못된 요청"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppErrorResponse"
              examples:
                BAD_REQUEST:
                  value:
                    success: false
                    data: null
                    error:
                      code: "BAD_REQUEST"
                      message: "잘못된 요청입니다."
                      details: null
        "401":
          $ref: "#/components/responses/Unauthorized"
      security:
      - accessCookie: []
