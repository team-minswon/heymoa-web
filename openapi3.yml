                  value:
                    success: false
                    data: null
                    error:
                      code: "BAD_REQUEST"
                      message: "잘못된 요청입니다."
                      details: null
        "200":
          description: "요청 성공"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NoteResponse"
              examples:
                SUCCESS:
                  value:
                    success: true
                    data:
                      noteId: "0HZX2K7M9Q4AF"
                      projectId: "0HZX2K7M9Q4AE"
                      title: "주간 회의"
                      createdAt: "2026-07-14T01:02:03Z"
                      updatedAt: "2026-07-14T01:02:03Z"
                    error: null
        "401":
          $ref: "#/components/responses/Unauthorized"
      security:
      - accessCookie: []
    patch:
      tags:
      - "Notes"
      summary: "노트 수정"
      description: "노트 제목을 수정한다."
      operationId: "updateNote"
      parameters:
      - name: "noteId"
        in: "path"
        description: "노트의 13자리 TSID"
        required: true
        schema:
          type: "string"
          description: "노트의 13자리 TSID"
          nullable: false
          pattern: "^[0-9A-HJKMNP-TV-Z]{13}$"
          minLength: 13
          maxLength: 13
        example: "0HZX2K7M9Q4AF"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NoteRequest"
            examples:
              updateNote_Success:
                value:
                  title: "주간 회의"
              updateNote_WorkspaceNotFoundException:
                value:
                  title: "주간 회의"
              updateNote_ProjectNotFoundException:
                value:
                  title: "주간 회의"
              updateNote_NoteNotFoundException:
                value:
                  title: "주간 회의"
              updateNote_BadRequest:
                value:
                  title: ""
      responses:
        "200":
          description: "요청 성공"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NoteResponse"
              examples:
                SUCCESS:
                  value:
                    success: true
                    data:
                      noteId: "0HZX2K7M9Q4AF"
                      projectId: "0HZX2K7M9Q4AE"
                      title: "주간 회의"
                      createdAt: "2026-07-14T01:02:03Z"
                      updatedAt: "2026-07-14T01:02:03Z"
                    error: null
        "404":
          description: "요청한 리소스를 찾을 수 없음"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppErrorResponse"
              examples:
                WORKSPACE_NOT_FOUND:
                  value:
                    success: false
                    data: null
                    error:
                      code: "WORKSPACE_NOT_FOUND"
                      message: "워크스페이스를 찾을 수 없습니다."
                      details: null
                PROJECT_NOT_FOUND:
                  value:
                    success: false
                    data: null
                    error:
                      code: "PROJECT_NOT_FOUND"
                      message: "프로젝트를 찾을 수 없습니다."
                      details: null
                NOTE_NOT_FOUND:
                  value:
                    success: false
                    data: null
                    error:
                      code: "NOTE_NOT_FOUND"
                      message: "노트를 찾을 수 없습니다."
                      details: null
        "400":
          description: "잘못된 요청"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppErrorResponse"
              examples:
                BAD_REQUEST:
                  value:
                    success: false
                    data: null
                    error:
                      code: "BAD_REQUEST"
                      message: "잘못된 요청입니다."
                      details: null
        "401":
          $ref: "#/components/responses/Unauthorized"
      security:
      - accessCookie: []
