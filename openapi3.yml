# heymoa-server 빌드 산출물의 미러 (docs/contracts/openapi3-server.yml).
# 손으로 수정하지 말 것. 갱신: docs repo에서 복사한 뒤 /internal/** 경로를 제거.
#
# /internal/** 3경로(callbacks/analyses, notes/{noteId}/context,
# workspaces/{workspaceId}/notes)는 heymoa-ai가 호출하는 경로라 web에서 제외한다 —
# 남기면 브라우저가 부르지 않는 훅과 MSW 목이 생긴다. internalToken 보안 스킴도
# 참조하는 경로가 사라져 함께 제거했다. 그 경로만 쓰던 InternalNoteContextResponse·
# InternalWorkspaceNotesResponse 스키마도 같이 뺀다 — 남기면 아무도 안 쓰는 모델이 생성된다.
---
openapi: "3.0.1"
info:
  title: "Heymoa API"
  description: "Heymoa 서버 REST API"
  version: "1.0.0"
servers:
- url: "/"
tags: []
paths:
  /v1/agent-chats:
    post:
      tags:
      - "AgentChat"
      summary: "채팅 세션 생성"
      description: "연결할 노트에 접근할 수 없으면 404로 응답한다."
      operationId: "createAgentChat"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAgentChatV2Request"
            examples:
              createAgentChat_NoteNotFoundException:
                value:
                  scope: "note"
                  noteId: "0HZX2K7M9Q4AF"
                  title: "회의 후속"
              createAgentChat_WorkspaceNotFoundException:
                value:
                  scope: "workspace"
                  workspaceId: "0HZX2K7M9Q4AD"
                  title: "워크스페이스 질문"
              createAgentChat_Success:
                value:
                  scope: "note"
                  noteId: "0HZX2K7M9Q4AF"
                  title: "회의 후속"
              createAgentChat_ProjectNotFoundException:
                value:
                  scope: "note"
                  noteId: "0HZX2K7M9Q4AF"
                  title: "회의 후속"
              createAgentChat_BadRequest:
                value:
                  scope: "workspace"
                  title: "워크스페이스 질문"
      responses:
        "404":
          description: "요청한 리소스를 찾을 수 없음"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppErrorResponse"
              examples:
                NOTE_NOT_FOUND:
                  value:
                    success: false
                    data: null
                    error:
                      code: "NOTE_NOT_FOUND"
                      message: "노트를 찾을 수 없습니다."
                      details: null
                WORKSPACE_NOT_FOUND:
                  value:
                    success: false
                    data: null
                    error:
                      code: "WORKSPACE_NOT_FOUND"
                      message: "워크스페이스를 찾을 수 없습니다."
                      details: null
                PROJECT_NOT_FOUND:
                  value:
                    success: false
                    data: null
                    error:
                      code: "PROJECT_NOT_FOUND"
                      message: "프로젝트를 찾을 수 없습니다."
                      details: null
        "201":
          description: "생성 성공"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentChatV2Response"
              examples:
                SUCCESS:
                  value:
                    success: true
                    data:
                      chatId: "0K9GVJT2C4Q2A"
                      scope: "note"
                      workspaceId: null
                      noteId: "0HZX2K7M9Q4AF"
                      title: "회의 후속"
                      createdAt: "2026-07-22T00:00:00Z"
                    error: null
        "400":
          description: "잘못된 요청"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppErrorResponse"
              examples:
                BAD_REQUEST:
                  value:
                    success: false
                    data: null
                    error:
                      code: "BAD_REQUEST"
                      message: "잘못된 요청입니다."
                      details: null
        "401":
          $ref: "#/components/responses/Unauthorized"
      security:
      - accessCookie: []
  /v1/notifications:
    get:
      tags:
      - "Notifications"
      summary: "알림 목록 조회"
      description: "현재 사용자의 알림을 최신순으로 최대 50개 조회하고 읽지 않은 알림 개수를 함께 반환한다."
      operationId: "getNotifications"
      responses:
        "200":
          description: "요청 성공"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationListResponse"
              examples:
                SUCCESS:
                  value:
                    success: true
                    data:
                      notifications:
                      - notificationId: "0HZX2K7M9Q4AJ"
                        type: "WORKSPACE_INVITATION"
                        readAt: "2026-07-14T01:02:03Z"
                        createdAt: "2026-07-14T01:02:03Z"
                        invitation:
                          invitationId: "0HZX2K7M9Q4AK"
                          status: "PENDING"
                          role: "MEMBER"
                          workspaceId: "0HZX2K7M9Q4AD"
                          workspaceName: "제품 팀"
                          inviterName: "홍길동"
                      unreadCount: 0
                    error: null
        "401":
          $ref: "#/components/responses/Unauthorized"
      security:
      - accessCookie: []
  /v1/workspaces:
    get:
      tags:
      - "Workspaces"
      summary: "워크스페이스 목록 조회"
      description: "현재 사용자가 참여 중인 워크스페이스 목록을 조회한다."
      operationId: "getWorkspaces"
      responses:
        "200":
          description: "요청 성공"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceListResponse"
              examples:
                SUCCESS:
                  value:
                    success: true
                    data:
                      workspaces:
                      - workspaceId: "0HZX2K7M9Q4AD"
                        name: "제품 팀"
                        description: "제품을 만드는 팀의 워크스페이스"
                        role: "ADMIN"
                        isDefault: false
                    error: null
        "401":
          $ref: "#/components/responses/Unauthorized"
      security:
      - accessCookie: []
    post:
      tags:
      - "Workspaces"
      summary: "워크스페이스 생성"
      description: "현재 사용자가 관리할 새 워크스페이스를 생성한다."
      operationId: "createWorkspace"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkspaceRequest"
            examples:
              createWorkspace_BadRequest:
                value:
                  name: ""
                  description: null
              createWorkspace_Success:
                value:
                  name: "제품 팀"
                  description: "제품을 만드는 팀의 워크스페이스"
      responses:
        "400":
          description: "잘못된 요청"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppErrorResponse"
              examples:
                BAD_REQUEST:
                  value:
                    success: false
                    data: null
                    error:
                      code: "BAD_REQUEST"
                      message: "잘못된 요청입니다."
                      details: null
        "201":
          description: "생성 성공"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateWorkspaceResponse"
              examples:
                SUCCESS:
                  value:
                    success: true
                    data:
                      workspaceId: "0HZX2K7M9Q4AD"
                      name: "제품 팀"
                      description: "제품을 만드는 팀의 워크스페이스"
                      role: "ADMIN"
                      isDefault: false
                    error: null
        "401":
          $ref: "#/components/responses/Unauthorized"
      security:
      - accessCookie: []
  /v1/agent-chats/active:
    get:
      tags:
      - "AgentChat"
      summary: "활성 세션 조회"
      description: "scope와 대상 식별자가 일치하지 않으면 400으로 응답한다 (workspace→workspaceId 필수,\
        \ note→noteId 필수)."
      operationId: "getActiveAgentChat"
      parameters:
      - name: "scope"
        in: "query"
        description: "컨텍스트 범위 (workspace: 워크스페이스 전체, note: 노트 단건)"
        required: true
        schema:
          type: "string"
          description: "컨텍스트 범위 (workspace: 워크스페이스 전체, note: 노트 단건)"
          nullable: false
          enum:
          - "workspace"
          - "note"
        example: "workspace"
      - name: "workspaceId"
        in: "query"
        description: "조회할 워크스페이스 TSID (scope=workspace일 때 필수)"
        required: false
        schema:
          type: "string"
          description: "조회할 워크스페이스 TSID (scope=workspace일 때 필수)"
          nullable: false
          pattern: "^[0-9A-HJKMNP-TV-Z]{13}$"
          minLength: 13
          maxLength: 13
        example: "0HZX2K7M9Q4AD"
      - name: "noteId"
        in: "query"
        description: "조회할 노트 TSID (scope=note일 때 필수)"
        required: false
        schema:
          type: "string"
          description: "조회할 노트 TSID (scope=note일 때 필수)"
          nullable: false
          pattern: "^[0-9A-HJKMNP-TV-Z]{13}$"
          minLength: 13
          maxLength: 13
        example: "0HZX2K7M9Q4AF"
      responses:
        "400":
          description: "잘못된 요청"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppErrorResponse"
              examples:
                BAD_REQUEST:
                  value:
                    success: false
                    data: null
                    error:
                      code: "BAD_REQUEST"
                      message: "잘못된 요청입니다."
                      details: null
        "200":
          description: "요청 성공"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentChatV2NullableResponse"
              examples:
                SUCCESS:
                  value:
                    success: true
                    data:
                      chatId: "0K9GVJT2C4Q2A"
                      scope: "workspace"
                      workspaceId: "0HZX2K7M9Q4AD"
                      noteId: null
                      title: "워크스페이스 질문"
                      createdAt: "2026-07-22T00:00:00Z"
                    error: null
        "401":
          $ref: "#/components/responses/Unauthorized"
      security:
      - accessCookie: []
  /v1/auth/logout:
    post:
      tags:
      - "Auth"
      summary: "로그아웃"
      description: "현재 세션을 폐기하고 access token과 refresh token 쿠키를 만료시킨다."
      operationId: "logout"
      parameters:
      - name: "refresh_token"
        in: "cookie"
        description: "refresh_token 쿠키"
        required: false
        schema:
          type: "string"
        example: "refresh-token-example"
      responses:
        "200":
          description: "요청 성공"
          headers:
            Set-Cookie:
              description: "만료된 access_token 및 refresh_token HttpOnly 쿠키"
              schema:
                type: "string"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogoutResponse"
              examples:
                SUCCESS:
                  value:
                    success: true
                    data:
                      message: "성공적으로 로그아웃했습니다."
                    error: null
      security: []
  /v1/auth/refresh:
    post:
      tags:
      - "Auth"
      summary: "토큰 갱신"
      description: "리프레시 토큰 쿠키로 access token과 refresh token을 갱신한다."
      operationId: "refreshTokens"
      parameters:
      - name: "refresh_token"
        in: "cookie"
        description: "refresh_token 쿠키"
        required: false
        schema:
          type: "string"
        example: "refresh-token-example"
      - name: "User-Agent"
        in: "header"
        description: "클라이언트 User-Agent"
        required: false
        schema:
          type: "string"
        example: "Heymoa Docs Client"
      - name: "X-Forwarded-For"
        in: "header"
        description: "프록시가 전달한 클라이언트 IP 목록"
        required: false
        schema:
          type: "string"
        example: "203.0.113.10, 10.0.0.1"
      responses:
        "400":
          description: "잘못된 요청"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppErrorResponse"
              examples:
                BAD_REQUEST:
                  value:
                    success: false
                    data: null
                    error:
                      code: "BAD_REQUEST"
                      message: "잘못된 요청입니다."
                      details: null
        "200":
          description: "요청 성공"
          headers:
            Set-Cookie:
              description: "갱신된 access_token 및 refresh_token HttpOnly 쿠키"
              schema:
                type: "string"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshTokensResponse"
              examples:
                SUCCESS:
                  value:
                    success: true
                    data:
                      message: "토큰이 갱신되었습니다."
                    error: null
      security: []
  /v1/notes/{noteId}:
