        data:
          required:
          - "description"
          - "isDefault"
          - "name"
          - "role"
          - "workspaceId"
          type: "object"
          properties:
            isDefault:
              type: "boolean"
              description: "현재 사용자의 기본 워크스페이스 여부"
              nullable: false
              example: false
            role:
              type: "string"
              description: "현재 사용자의 워크스페이스 역할"
              nullable: false
              example: "ADMIN"
              enum:
              - "ADMIN"
              - "MEMBER"
            name:
              type: "string"
              description: "워크스페이스 이름"
              nullable: false
              example: "제품 팀"
              maxLength: 100
            description:
              type: "string"
              description: "워크스페이스 설명"
              nullable: true
              example: "제품을 만드는 팀의 워크스페이스"
              maxLength: 1000
            workspaceId:
              type: "string"
              description: "워크스페이스의 13자리 TSID"
              nullable: false
              example: "0HZX2K7M9Q4AD"
              pattern: "^[0-9A-HJKMNP-TV-Z]{13}$"
              minLength: 13
              maxLength: 13
          description: "성공 응답 데이터"
          nullable: false
        success:
          type: "boolean"
          description: "요청 성공 여부"
          nullable: false
          example: true
        error:
          nullable: true
          enum:
          - null
          description: "성공 시 null인 오류 정보"
    AnalysisResultCallback:
      title: "AnalysisResultCallback"
      oneOf:
      - $ref: "#/components/schemas/AnalysisSucceededCallback"
      - $ref: "#/components/schemas/AnalysisFailedCallback"
      discriminator:
        propertyName: "status"
        mapping:
          SUCCEEDED: "#/components/schemas/AnalysisSucceededCallback"
          FAILED: "#/components/schemas/AnalysisFailedCallback"
    ProjectRequest:
      title: "ProjectRequest"
      required:
      - "name"
      type: "object"
      properties:
        name:
          type: "string"
          description: "프로젝트 이름"
          nullable: false
          example: "모바일 앱"
          minLength: 1
          maxLength: 100
        description:
          type: "string"
          description: "프로젝트 설명"
          nullable: true
          example: "Heymoa 모바일 앱 프로젝트"
          maxLength: 1000
    AnalysisResultResponse:
      title: "AnalysisResultResponse"
      required:
      - "data"
      - "error"
      - "success"
      type: "object"
      properties:
        data:
          required:
          - "actionItems"
          - "analysisId"
          - "insights"
          - "noteId"
          - "overview"
          - "status"
          - "errorCode"
          - "errorMessage"
          type: "object"
          properties:
            overview:
              type: "string"
              description: "회의 개요 (markdown, 미완료 시 null)"
              nullable: true
              example: "# 개요"
            insights:
              type: "string"
              description: "insight (markdown, 미완료 시 null)"
              nullable: true
              example: "- 인사이트"
            actionItems:
              type: "string"
              description: "action item (markdown, 미완료 시 null)"
              nullable: true
              example: "- 액션"
            errorMessage:
              type: "string"
              description: "에러 메시지 (FAILED일 때)"
              nullable: true
              example: "분석이 제한 시간을 초과했습니다."
            errorCode:
              type: "string"
              description: "에러 코드 (FAILED일 때)"
              nullable: true
              example: "ANALYSIS_TIMEOUT"
            analysisId:
              type: "string"
              description: "분석 잡의 13자리 TSID"
              nullable: false
              example: "0K9GVJT2C4Q1Z"
              pattern: "^[0-9A-HJKMNP-TV-Z]{13}$"
              minLength: 13
              maxLength: 13
            noteId:
              type: "string"
              description: "노트의 13자리 TSID"
              nullable: false
              example: "0HZX2K7M9Q4AF"
              pattern: "^[0-9A-HJKMNP-TV-Z]{13}$"
              minLength: 13
              maxLength: 13
            status:
              type: "string"
              description: "분석 잡 상태"
              nullable: false
              example: "SUCCEEDED"
              enum:
              - "PENDING"
              - "RUNNING"
              - "SUCCEEDED"
              - "FAILED"
          description: "성공 응답 데이터"
          nullable: false
        success:
          type: "boolean"
          description: "요청 성공 여부"
          nullable: false
          example: true
        error:
          nullable: true
          enum:
          - null
          description: "성공 시 null인 오류 정보"
    AnalysisSucceededCallback:
      title: "AnalysisSucceededCallback"
      type: "object"
      required:
      - "status"
      - "overview"
      - "actionItems"
      - "insights"
      properties:
        status:
          type: "string"
          description: "SUCCEEDED 고정"
          enum:
          - "SUCCEEDED"
          example: "SUCCEEDED"
        overview:
          type: "string"
          description: "회의 개요 (markdown)"
          example: "## 개요\n주간 회의에서 다음 스프린트 범위를 정했다."
        actionItems:
          type: "string"
          description: "action item 목록 (markdown)"
          example: "- [ ] 김민수: 계약 문서 갱신"
        insights:
          type: "string"
          description: "insight 목록 (markdown)"
          example: "- 배포 주기가 병목이다."
    AnalysisFailedCallback:
      title: "AnalysisFailedCallback"
      type: "object"
      required:
      - "status"
      - "error"
      properties:
        status:
          type: "string"
          description: "FAILED 고정"
          enum:
          - "FAILED"
          example: "FAILED"
        error:
          type: "object"
          required:
          - "code"
          - "message"
          properties:
            code:
              type: "string"
              description: "기계 판독용 에러 코드"
              example: "ANALYSIS_TIMEOUT"
            message:
              type: "string"
              description: "에러 메시지"
              example: "분석이 제한 시간을 초과했습니다."
    AppErrorDetail:
      type: "object"
      required:
      - "field"
      - "message"
      properties:
        field:
          type: "string"
          example: "name"
          description: "오류가 발생한 필드"
          nullable: false
        message:
          type: "string"
          example: "이름은 필수입니다."
          description: "필드 오류 메시지"
          nullable: false
      title: "AppErrorDetail"
    AppError:
      type: "object"
      required:
      - "code"
      - "message"
      - "details"
      properties:
        code:
          type: "string"
          example: "WORKSPACE_NOT_FOUND"
          description: "애플리케이션 오류 코드"
          nullable: false
        message:
          type: "string"
          example: "워크스페이스를 찾을 수 없습니다."
          description: "사용자에게 표시할 오류 메시지"
          nullable: false
        details:
          type: "array"
          nullable: true
          items:
            $ref: "#/components/schemas/AppErrorDetail"
          description: "필드별 오류 상세"
      description: "오류 정보"
      title: "AppError"
  securitySchemes:
    accessCookie:
      type: "apiKey"
      in: "cookie"
      name: "access_token"
      description: "로그인 후 발급되는 HttpOnly access token 쿠키"
  responses:
    Unauthorized:
      description: "인증 필요"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AppErrorResponse"
          examples:
            UNAUTHORIZED:
              value:
                success: false
                data: null
                error:
                  code: "UNAUTHORIZED"
                  message: "인증이 필요합니다."
                  details: null
