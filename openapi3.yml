openapi: 3.0.3
info:
  title: Heymoa API
  version: 0.0.1-SNAPSHOT
  description: API documentation for Heymoa Server
servers:
  - url: http://localhost:8080
    description: Local Server

paths:
  /v1/users/me:
    get:
      tags:
        - User
      summary: 현재 사용자 조회
      description: access_token 쿠키로 인증된 현재 사용자 정보를 조회합니다.
      security:
        - access_token: []
      responses:
        '200':
          description: 현재 사용자 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppResponse_CurrentUserInfoResponse'
        '401':
          description: 인증 쿠키가 없거나 유효하지 않음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppResponse_Unit'
        '404':
          description: 사용자를 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppResponse_Unit'
        '500':
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppResponse_Unit'

  /v1/auth/refresh:
    post:
      tags:
        - Auth
      summary: 토큰 갱신
      description: refresh_token 쿠키를 검증하고 access_token과 refresh_token 쿠키를 갱신합니다.
      parameters:
        - name: refresh_token
          in: cookie
          description: 갱신에 사용할 refresh token 쿠키
          required: false
          schema:
            type: string
        - name: User-Agent
          in: header
          description: User Agent
          required: false
          schema:
            type: string
      responses:
        '200':
          description: 토큰 갱신 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppResponse_RefreshTokensResponse'
        '400':
          description: refresh token이 없거나 유효하지 않음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppResponse_Unit'
        '500':
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppResponse_Unit'

  /v1/auth/logout:
    post:
      tags:
        - Auth
      summary: 로그아웃
      description: 서버 세션을 정리하고 인증 쿠키를 만료합니다. refresh_token이 없어도 성공합니다.
      parameters:
        - name: refresh_token
          in: cookie
          description: 폐기할 refresh token 쿠키
          required: false
          schema:
            type: string
      responses:
        '200':
          description: 로그아웃 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppResponse_LogoutResponse'
        '500':
          description: 서버 내부 오류
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppResponse_Unit'

components:
  securitySchemes:
    access_token:
      type: apiKey
      in: cookie
      name: access_token
      description: 인증을 위한 Access Token 쿠키

  schemas:
    AppResponse_CurrentUserInfoResponse:
      type: object
      description: 응답 Wrapper
      properties:
        success:
          type: boolean
          description: 요청 성공 여부
          example: true
        data:
          $ref: '#/components/schemas/CurrentUserInfoResponse'
        error:
          $ref: '#/components/schemas/AppErrorBody'

    AppResponse_RefreshTokensResponse:
      type: object
      description: 응답 Wrapper
      properties:
        success:
          type: boolean
          description: 요청 성공 여부
          example: true
        data:
          $ref: '#/components/schemas/RefreshTokensResponse'
        error:
          $ref: '#/components/schemas/AppErrorBody'

    AppResponse_LogoutResponse:
      type: object
      description: 응답 Wrapper
      properties:
        success:
          type: boolean
          description: 요청 성공 여부
          example: true
        data:
          $ref: '#/components/schemas/LogoutResponse'
        error:
          $ref: '#/components/schemas/AppErrorBody'

    AppResponse_Unit:
      type: object
      description: 에러 응답 Wrapper
      properties:
        success:
          type: boolean
          description: 요청 성공 여부
          example: false
        error:
          $ref: '#/components/schemas/AppErrorBody'

    CurrentUserInfoResponse:
      type: object
      description: 현재 사용자 정보
      properties:
        userId:
          type: string
          description: 사용자 ID
          example: 0HZX2K7M9Q4AB
        name:
          type: string
          description: 사용자 이름
          example: 홍길동
        email:
          type: string
          description: 이메일
          example: user@example.com

    RefreshTokensResponse:
      type: object
      description: 토큰 갱신 결과
      properties:
        message:
          type: string
          description: 처리 결과 메시지
          example: 토큰이 갱신되었습니다.

    LogoutResponse:
      type: object
      description: 로그아웃 결과
      properties:
        message:
          type: string
          description: 처리 결과 메시지
          example: 성공적으로 로그아웃했습니다.

    AppErrorBody:
      type: object
      description: 실패 응답 정보
      properties:
        code:
          type: string
          description: 에러 코드 (예. BAD_REQUEST, NOT_FOUND, INTERNAL_SERVER_ERROR, USER_NOT_FOUND)
          example: BAD_REQUEST
        message:
          type: string
          description: 에러 메시지
          example: 잘못된 요청입니다.
        details:
          type: array
          description: 필드별 상세 오류
          nullable: true
          items:
            $ref: '#/components/schemas/AppErrorDetail'

    AppErrorDetail:
      type: object
      description: 에러 상세 정보
      properties:
        field:
          type: string
          description: 오류가 발생한 필드
          example: email
        message:
          type: string
          description: 필드 오류 메시지
          example: 올바른 이메일 형식이어야 합니다.
