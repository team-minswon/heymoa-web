    delete:
      tags:
      - "Projects"
      summary: "프로젝트 삭제"
      description: "관리자 권한으로 노트가 없는 프로젝트를 삭제한다."
      operationId: "deleteProject"
      parameters:
      - name: "workspaceId"
        in: "path"
        description: "워크스페이스의 13자리 TSID"
        required: true
        schema:
          type: "string"
          description: "워크스페이스의 13자리 TSID"
          nullable: false
          pattern: "^[0-9A-HJKMNP-TV-Z]{13}$"
          minLength: 13
          maxLength: 13
        example: "0HZX2K7M9Q4AD"
      - name: "projectId"
        in: "path"
        description: "프로젝트의 13자리 TSID"
        required: true
        schema:
          type: "string"
          description: "프로젝트의 13자리 TSID"
          nullable: false
          pattern: "^[0-9A-HJKMNP-TV-Z]{13}$"
          minLength: 13
          maxLength: 13
        example: "0HZX2K7M9Q4AE"
      responses:
        "204":
          description: "처리 성공"
        "409":
          description: "요청 상태 충돌"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppErrorResponse"
              examples:
                PROJECT_HAS_NOTES:
                  value:
                    success: false
                    data: null
                    error:
                      code: "PROJECT_HAS_NOTES"
                      message: "노트가 있는 프로젝트는 삭제할 수 없습니다."
                      details: null
        "404":
          description: "요청한 리소스를 찾을 수 없음"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppErrorResponse"
              examples:
                WORKSPACE_NOT_FOUND:
                  value:
                    success: false
                    data: null
                    error:
                      code: "WORKSPACE_NOT_FOUND"
                      message: "워크스페이스를 찾을 수 없습니다."
                      details: null
                PROJECT_NOT_FOUND:
                  value:
                    success: false
                    data: null
                    error:
                      code: "PROJECT_NOT_FOUND"
                      message: "프로젝트를 찾을 수 없습니다."
                      details: null
        "400":
          description: "잘못된 요청"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppErrorResponse"
              examples:
                BAD_REQUEST:
                  value:
                    success: false
                    data: null
                    error:
                      code: "BAD_REQUEST"
                      message: "잘못된 요청입니다."
                      details: null
        "403":
          description: "권한 없음"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppErrorResponse"
              examples:
                WORKSPACE_ACCESS_DENIED:
                  value:
                    success: false
                    data: null
                    error:
                      code: "WORKSPACE_ACCESS_DENIED"
                      message: "워크스페이스를 변경할 권한이 없습니다."
                      details: null
        "401":
          $ref: "#/components/responses/Unauthorized"
      security:
      - accessCookie: []
