openapi: 3.0.3
info:
  title: Heymoa API
  version: 0.0.1-SNAPSHOT
  description: API documentation for Heymoa Server
servers:
  - url: http://localhost:8080
    description: Local Server

paths:
  /v1/users/me:
    get:
      tags: [User]
      operationId: getCurrentUser
      summary: 현재 사용자 조회
      security:
        - access_token: []
      responses:
        "200":
          description: 현재 사용자 조회 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppResponse_CurrentUserResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
    patch:
      tags: [User]
      operationId: updateCurrentUser
      summary: 현재 사용자 수정
      security:
        - access_token: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCurrentUserRequest"
      responses:
        "200":
          description: 현재 사용자 수정 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppResponse_CurrentUserResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /v1/auth/refresh:
    post:
      tags: [Auth]
      summary: 토큰 갱신
      parameters:
        - name: refresh_token
          in: cookie
          required: false
          schema:
            type: string
        - name: User-Agent
          in: header
          required: false
          schema:
            type: string
      responses:
        "200":
          description: 토큰 갱신 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppResponse_RefreshTokensResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /v1/auth/logout:
    post:
      tags: [Auth]
      summary: 로그아웃
      parameters:
        - name: refresh_token
          in: cookie
          required: false
          schema:
            type: string
      responses:
        "200":
          description: 로그아웃 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppResponse_LogoutResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /v1/workspaces:
    get:
      tags: [Workspace]
      operationId: listWorkspaces
      summary: 워크스페이스 목록 조회
      security:
        - access_token: []
      responses:
        "200":
          description: 워크스페이스 목록 조회 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppResponse_WorkspaceListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
    post:
      tags: [Workspace]
      operationId: createWorkspace
      summary: 워크스페이스 생성
      security:
        - access_token: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkspaceRequest"
      responses:
        "200":
          description: 워크스페이스 생성 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppResponse_WorkspaceResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /v1/workspaces/{workspaceId}:
    get:
      tags: [Workspace]
      operationId: getWorkspace
      summary: 워크스페이스 상세 조회
      security:
        - access_token: []
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Tsid"
      responses:
        "200":
          description: 워크스페이스 조회 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppResponse_WorkspaceResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
    patch:
      tags: [Workspace]
      operationId: updateWorkspace
      summary: 워크스페이스 수정
      security:
        - access_token: []
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Tsid"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWorkspaceRequest"
      responses:
        "200":
          description: 워크스페이스 수정 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppResponse_WorkspaceResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /v1/workspaces/{workspaceId}/default:
    put:
      tags: [Workspace]
      operationId: setDefaultWorkspace
      summary: 기본 워크스페이스 설정
      security:
        - access_token: []
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Tsid"
      responses:
        "200":
          description: 기본 워크스페이스 설정 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppResponse_WorkspaceResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /v1/workspaces/{workspaceId}/notes:
    get:
      tags: [Note]
      operationId: listWorkspaceNotes
      summary: 워크스페이스 노트 목록 조회
      security:
        - access_token: []
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Tsid"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
        - name: folderId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Tsid"
      responses:
        "200":
          description: 노트 목록 조회 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppResponse_NoteCursorPageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
    post:
      tags: [Note]
      operationId: createNote
      summary: 노트 생성
      security:
        - access_token: []
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Tsid"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNoteRequest"
      responses:
        "200":
          description: 노트 생성 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppResponse_NoteResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /v1/notes/{noteId}:
    get:
      tags: [Note]
      operationId: getNote
      summary: 노트 상세 조회
      security:
        - access_token: []
      parameters:
        - name: noteId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Tsid"
      responses:
        "200":
          description: 노트 조회 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppResponse_NoteResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
    put:
      tags: [Note]
      operationId: updateNote
      summary: 노트 수정
      security:
        - access_token: []
      parameters:
        - name: noteId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Tsid"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateNoteRequest"
      responses:
        "200":
          description: 노트 수정 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppResponse_NoteResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
    delete:
      tags: [Note]
      operationId: deleteNote
      summary: 노트 삭제
      security:
        - access_token: []
      parameters:
        - name: noteId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Tsid"
      responses:
        "200":
          description: 노트 삭제 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppResponse_Unit"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /v1/workspaces/{workspaceId}/folders:
    get:
      tags: [Folder]
      operationId: listWorkspaceFolders
      summary: 워크스페이스 폴더 목록 조회
      security:
        - access_token: []
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Tsid"
      responses:
        "200":
          description: 폴더 목록 조회 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppResponse_FolderListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
    post:
      tags: [Folder]
      operationId: createFolder
      summary: 폴더 생성
      security:
        - access_token: []
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Tsid"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FolderNameRequest"
      responses:
        "200":
          description: 폴더 생성 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppResponse_FolderResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /v1/folders/{folderId}:
    put:
      tags: [Folder]
      operationId: updateFolder
      summary: 폴더 이름 변경
      security:
        - access_token: []
      parameters:
        - name: folderId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Tsid"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FolderNameRequest"
      responses:
        "200":
          description: 폴더 수정 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppResponse_FolderResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "500":
          $ref: "#/components/responses/InternalServerError"
    delete:
      tags: [Folder]
      operationId: deleteFolder
      summary: 폴더 삭제
      security:
        - access_token: []
      parameters:
        - name: folderId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Tsid"
      responses:
        "200":
          description: 폴더 삭제 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppResponse_Unit"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /v1/notes/{noteId}/folders/{folderId}:
    put:
      tags: [Folder]
      operationId: attachNoteFolder
      summary: 노트에 폴더 연결
      security:
        - access_token: []
      parameters:
        - name: noteId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Tsid"
        - name: folderId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Tsid"
      responses:
        "200":
          description: 폴더 연결 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppResponse_NoteResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
    delete:
      tags: [Folder]
      operationId: detachNoteFolder
      summary: 노트의 폴더 연결 해제
      security:
        - access_token: []
      parameters:
        - name: noteId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Tsid"
        - name: folderId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Tsid"
      responses:
        "200":
          description: 폴더 연결 해제 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppResponse_NoteResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /v1/notes/{noteId}/transcription-sessions:
    post:
      tags: [Transcription]
      operationId: createTranscriptionSession
      summary: 실시간 전사 세션 생성
      security:
        - access_token: []
      parameters:
        - name: noteId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Tsid"
      responses:
        "200":
          description: 전사 세션 및 최초 연결 ticket 생성 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppResponse_TranscriptionConnectionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
        "500":
          $ref: "#/components/responses/InternalServerError"
    get:
      tags: [Transcription]
      operationId: listNoteTranscriptionSessions
      summary: 노트의 전사 세션 목록 조회
      security:
        - access_token: []
      parameters:
        - name: noteId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Tsid"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: 전사 세션 목록 조회 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppResponse_TranscriptionSessionCursorPageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /v1/transcription-sessions/active:
    get:
      tags: [Transcription]
      operationId: getActiveTranscriptionSession
      summary: 현재 사용자의 활성 전사 세션 조회
      security:
        - access_token: []
      responses:
        "200":
          description: 활성 전사 세션 조회 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppResponse_ActiveTranscriptionSessionResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /v1/transcription-sessions/{sessionId}:
    get:
      tags: [Transcription]
      operationId: getTranscriptionSession
      summary: 전사 세션 조회
      security:
        - access_token: []
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Tsid"
      responses:
        "200":
          description: 전사 세션 조회 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppResponse_TranscriptionSessionResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /v1/transcription-sessions/{sessionId}/connection-ticket:
    post:
      tags: [Transcription]
      operationId: createTranscriptionConnectionTicket
      summary: 전사 WebSocket 재연결 ticket 발급
      security:
        - access_token: []
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Tsid"
      responses:
        "200":
          description: 연결 ticket 발급 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppResponse_TranscriptionConnectionResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /v1/notes/{noteId}/transcript-segments:
    get:
      tags: [Transcription]
      operationId: listNoteTranscriptSegments
      summary: 노트의 확정 전사 구간 목록 조회
      security:
        - access_token: []
      parameters:
        - name: noteId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Tsid"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: 확정 전사 구간 목록 조회 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppResponse_TranscriptSegmentCursorPageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /v1/transcript-segments/{segmentId}:
    delete:
      tags: [Transcription]
      operationId: deleteTranscriptSegment
      summary: 확정 전사 구간 삭제
      security:
        - access_token: []
      parameters:
        - name: segmentId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/Tsid"
      responses:
        "200":
          description: 확정 전사 구간 삭제 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppResponse_Unit"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"

components:
  securitySchemes:
    access_token:
      type: apiKey
      in: cookie
      name: access_token
      description: 인증을 위한 Access Token 쿠키

  parameters:
    Cursor:
      name: cursor
      in: query
      required: false
      schema:
        type: string
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

  responses:
    BadRequest:
      description: 잘못된 요청
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AppErrorResponse"
    Unauthorized:
      description: 인증이 필요함
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AppErrorResponse"
    Forbidden:
      description: 접근 권한이 없음
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AppErrorResponse"
    NotFound:
      description: 리소스를 찾을 수 없음
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AppErrorResponse"
    Conflict:
      description: 현재 리소스 상태와 충돌함
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AppErrorResponse"
    ServiceUnavailable:
      description: STT provider를 사용할 수 없음
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AppErrorResponse"
    InternalServerError:
      description: 서버 내부 오류
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AppErrorResponse"

  schemas:
    Tsid:
      type: string
      minLength: 13
      maxLength: 13
      pattern: "^[0-9A-HJKMNP-TV-Z]{13}$"
      example: 0HZX2K7M9Q4AB

    UserSummary:
      type: object
      required: [userId, name]
      properties:
        userId:
          $ref: "#/components/schemas/Tsid"
        name:
          type: string
          example: 테스트 유저

    WorkspaceResponse:
      type: object
      required:
        [workspaceId, name, description, isDefault, createdAt, updatedAt]
      properties:
        workspaceId:
          $ref: "#/components/schemas/Tsid"
        name:
          type: string
          minLength: 1
          maxLength: 80
          example: 테스트 유저의 워크스페이스
        description:
          type: string
          nullable: true
          maxLength: 500
          example: 제품 회의 기록을 모으는 공간입니다.
        isDefault:
          type: boolean
          example: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    WorkspaceListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/WorkspaceResponse"

    CreateWorkspaceRequest:
      type: object
      required: [name, description]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 80
        description:
          type: string
          nullable: true
          maxLength: 500

    UpdateWorkspaceRequest:
      $ref: "#/components/schemas/CreateWorkspaceRequest"

    FolderResponse:
      type: object
      required: [folderId, name]
      properties:
        folderId:
          $ref: "#/components/schemas/Tsid"
        name:
          type: string
          minLength: 1
          maxLength: 50
          example: 제품

    NoteResponse:
      type: object
      required:
        [
          noteId,
          workspaceId,
          title,
          context,
          createdBy,
          folders,
          createdAt,
          updatedAt,
        ]
      properties:
        noteId:
          $ref: "#/components/schemas/Tsid"
        workspaceId:
          $ref: "#/components/schemas/Tsid"
        title:
          type: string
          minLength: 1
          maxLength: 200
          example: 주간 회의
        context:
          type: string
          nullable: true
          maxLength: 4000
          example: 이번 주 제품 진행 상황을 공유합니다.
        createdBy:
          $ref: "#/components/schemas/UserSummary"
        folders:
          type: array
          items:
            $ref: "#/components/schemas/FolderResponse"
        createdAt:
          type: string
          format: date-time
          example: "2026-07-11T00:00:00Z"
        updatedAt:
          type: string
          format: date-time
          example: "2026-07-11T00:00:00Z"

    NoteSummaryResponse:
      allOf:
        - $ref: "#/components/schemas/NoteResponse"
        - type: object
          required: [lastRecordedAt, recordedDurationMs]
          properties:
            lastRecordedAt:
              type: string
              format: date-time
              nullable: true
              example: "2026-07-11T00:00:00Z"
            recordedDurationMs:
              type: integer
              format: int64
              minimum: 0
              example: 120000

    NoteCursorPageResponse:
      type: object
      required: [items, nextCursor]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/NoteSummaryResponse"
        nextCursor:
          type: string
          nullable: true
          example: null

    CreateNoteRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
          example: 주간 회의
        context:
          type: string
          nullable: true
          maxLength: 4000
          example: null

    UpdateNoteRequest:
      type: object
      required: [title, context]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        context:
          type: string
          nullable: true
          maxLength: 4000

    FolderNameRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 50
          example: 제품

    TranscriptionSessionStatus:
      type: string
      enum:
        [
          CONNECTING,
          STREAMING,
          PAUSED,
          FINALIZING,
          COMPLETED,
          INTERRUPTED,
          FAILED,
        ]

    TranscriptionSessionResponse:
      type: object
      required:
        [
          sessionId,
          noteId,
          status,
          recordedDurationMs,
          startedBy,
          startedAt,
          endedAt,
        ]
      properties:
        sessionId:
          $ref: "#/components/schemas/Tsid"
        noteId:
          $ref: "#/components/schemas/Tsid"
        status:
          $ref: "#/components/schemas/TranscriptionSessionStatus"
        recordedDurationMs:
          type: integer
          format: int64
          minimum: 0
          example: 120000
        startedBy:
          $ref: "#/components/schemas/UserSummary"
        startedAt:
          type: string
          format: date-time
          example: "2026-07-11T00:00:00Z"
        endedAt:
          type: string
          format: date-time
          nullable: true
          example: null

    TranscriptionConnectionResponse:
      type: object
      required: [session, socketUrl, ticketExpiresAt]
      properties:
        session:
          $ref: "#/components/schemas/TranscriptionSessionResponse"
        socketUrl:
          type: string
          format: uri
          example: ws://localhost:8080/v1/transcription-sessions/0HZX2K7M9Q4AB/stream?ticket=opaque-ticket
        ticketExpiresAt:
          type: string
          format: date-time
          example: "2026-07-11T00:01:00Z"

    ActiveTranscriptionSessionResponse:
      type: object
      required: [session]
      properties:
        session:
          allOf:
            - $ref: "#/components/schemas/TranscriptionSessionResponse"
          nullable: true

    TranscriptSegmentResponse:
      type: object
      required: [segmentId, sessionId, sequence, text, startedAtMs, endedAtMs]
      properties:
        segmentId:
          $ref: "#/components/schemas/Tsid"
        sessionId:
          $ref: "#/components/schemas/Tsid"
        sequence:
          type: integer
          format: int32
          minimum: 1
          example: 1
        text:
          type: string
          minLength: 1
          example: 확정 문장
        startedAtMs:
          type: integer
          format: int64
          minimum: 0
          example: 0
        endedAtMs:
          type: integer
          format: int64
          minimum: 0
          example: 1200

    TranscriptionSessionCursorPageResponse:
      type: object
      required: [items, nextCursor]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/TranscriptionSessionResponse"
        nextCursor:
          type: string
          nullable: true
          example: null

    TranscriptSegmentCursorPageResponse:
      type: object
      required: [items, nextCursor]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/TranscriptSegmentResponse"
        nextCursor:
          type: string
          nullable: true
          example: null

    CurrentUserResponse:
      type: object
      required: [userId, name, email]
      properties:
        userId:
          $ref: "#/components/schemas/Tsid"
        name:
          type: string
          example: 홍길동
        email:
          type: string
          format: email
          example: user@example.com

    UpdateCurrentUserRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 80

    RefreshTokensResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
          example: 토큰이 갱신되었습니다.

    LogoutResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
          example: 성공적으로 로그아웃했습니다.

    AppErrorType:
      type: string
      enum:
        - BAD_REQUEST
        - UNAUTHORIZED
        - FORBIDDEN
        - WORKSPACE_NOT_FOUND
        - NOTE_NOT_FOUND
        - FOLDER_NOT_FOUND
        - FOLDER_NAME_ALREADY_EXISTS
        - TRANSCRIPTION_SESSION_NOT_FOUND
        - TRANSCRIPT_SEGMENT_NOT_FOUND
        - ACTIVE_TRANSCRIPTION_SESSION_EXISTS
        - INVALID_TRANSCRIPTION_SESSION_STATE
        - STT_PROVIDER_UNAVAILABLE
        - INTERNAL_SERVER_ERROR

    AppErrorBody:
      type: object
      required: [code, message]
      properties:
        code:
          $ref: "#/components/schemas/AppErrorType"
        message:
          type: string
          example: 잘못된 요청입니다.
        details:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/AppErrorDetail"

    AppErrorDetail:
      type: object
      required: [field, message]
      properties:
        field:
          type: string
          example: title
        message:
          type: string
          example: 제목은 비어 있을 수 없습니다.

    AppErrorResponse:
      type: object
      required: [success, error]
      properties:
        success:
          type: boolean
          enum: [false]
        error:
          $ref: "#/components/schemas/AppErrorBody"

    AppResponse_CurrentUserResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          $ref: "#/components/schemas/CurrentUserResponse"

    AppResponse_RefreshTokensResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          $ref: "#/components/schemas/RefreshTokensResponse"

    AppResponse_LogoutResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          $ref: "#/components/schemas/LogoutResponse"

    AppResponse_WorkspaceResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          $ref: "#/components/schemas/WorkspaceResponse"

    AppResponse_WorkspaceListResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          $ref: "#/components/schemas/WorkspaceListResponse"

    AppResponse_FolderResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          $ref: "#/components/schemas/FolderResponse"

    AppResponse_FolderListResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          type: array
          items:
            $ref: "#/components/schemas/FolderResponse"

    AppResponse_NoteResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          $ref: "#/components/schemas/NoteResponse"

    AppResponse_NoteCursorPageResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          $ref: "#/components/schemas/NoteCursorPageResponse"

    AppResponse_TranscriptionSessionResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          $ref: "#/components/schemas/TranscriptionSessionResponse"

    AppResponse_TranscriptionConnectionResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          $ref: "#/components/schemas/TranscriptionConnectionResponse"

    AppResponse_ActiveTranscriptionSessionResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          $ref: "#/components/schemas/ActiveTranscriptionSessionResponse"

    AppResponse_TranscriptionSessionCursorPageResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          $ref: "#/components/schemas/TranscriptionSessionCursorPageResponse"

    AppResponse_TranscriptSegmentCursorPageResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          $ref: "#/components/schemas/TranscriptSegmentCursorPageResponse"

    AppResponse_Unit:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          nullable: true
