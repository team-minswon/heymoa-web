---
openapi: "3.0.1"
info:
  title: "Heymoa API"
  description: "Heymoa 서버 REST API"
  version: "1.0.0"
servers:
- url: "/"
tags: []
paths:
  /v1/workspaces:
    get:
      tags:
      - "Workspaces"
      summary: "워크스페이스 목록 조회"
      description: "현재 사용자가 참여 중인 워크스페이스 목록을 조회한다."
      operationId: "getWorkspaces"
      responses:
        "200":
          description: "요청 성공"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceListResponse"
              examples:
                SUCCESS:
                  value:
                    success: true
                    data:
                      workspaces:
                      - workspaceId: "0HZX2K7M9Q4AD"
                        name: "제품 팀"
                        description: "제품을 만드는 팀의 워크스페이스"
                        role: "ADMIN"
                        isDefault: false
                    error: null
        "401":
          $ref: "#/components/responses/Unauthorized"
      security:
      - accessCookie: []
    post:
      tags:
      - "Workspaces"
      summary: "워크스페이스 생성"
      description: "현재 사용자가 관리할 새 워크스페이스를 생성한다."
      operationId: "createWorkspace"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkspaceRequest"
            examples:
              createWorkspace_BadRequest:
                value:
                  name: ""
                  description: null
              createWorkspace_Success:
                value:
                  name: "제품 팀"
                  description: "제품을 만드는 팀의 워크스페이스"
      responses:
        "400":
          description: "잘못된 요청"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppErrorResponse"
              examples:
                BAD_REQUEST:
                  value:
                    success: false
                    data: null
                    error:
                      code: "BAD_REQUEST"
                      message: "잘못된 요청입니다."
                      details: null
        "201":
          description: "생성 성공"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateWorkspaceResponse"
              examples:
                SUCCESS:
                  value:
                    success: true
                    data:
                      workspaceId: "0HZX2K7M9Q4AD"
                      name: "제품 팀"
                      description: "제품을 만드는 팀의 워크스페이스"
                      role: "ADMIN"
                      isDefault: false
                    error: null
        "401":
          $ref: "#/components/responses/Unauthorized"
      security:
      - accessCookie: []
  /v1/auth/logout:
    post:
      tags:
      - "Auth"
      summary: "로그아웃"
      description: "현재 세션을 폐기하고 access token과 refresh token 쿠키를 만료시킨다."
      operationId: "logout"
      parameters:
      - name: "refresh_token"
        in: "cookie"
        description: "refresh_token 쿠키"
        required: false
        schema:
          type: "string"
        example: "refresh-token-example"
      responses:
        "200":
          description: "요청 성공"
          headers:
            Set-Cookie:
              description: "만료된 access_token 및 refresh_token HttpOnly 쿠키"
              schema:
                type: "string"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogoutResponse"
              examples:
                SUCCESS:
                  value:
                    success: true
                    data:
                      message: "성공적으로 로그아웃했습니다."
                    error: null
      security: []
  /v1/auth/refresh:
    post:
      tags:
      - "Auth"
      summary: "토큰 갱신"
      description: "리프레시 토큰 쿠키로 access token과 refresh token을 갱신한다."
      operationId: "refreshTokens"
      parameters:
      - name: "refresh_token"
        in: "cookie"
        description: "refresh_token 쿠키"
        required: false
        schema:
          type: "string"
        example: "refresh-token-example"
      - name: "User-Agent"
        in: "header"
        description: "클라이언트 User-Agent"
        required: false
        schema:
          type: "string"
        example: "Heymoa Docs Client"
      - name: "X-Forwarded-For"
        in: "header"
        description: "프록시가 전달한 클라이언트 IP 목록"
        required: false
        schema:
          type: "string"
        example: "203.0.113.10, 10.0.0.1"
      responses:
        "400":
          description: "잘못된 요청"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppErrorResponse"
              examples:
                BAD_REQUEST:
                  value:
                    success: false
                    data: null
                    error:
                      code: "BAD_REQUEST"
                      message: "잘못된 요청입니다."
                      details: null
        "200":
          description: "요청 성공"
          headers:
            Set-Cookie:
              description: "갱신된 access_token 및 refresh_token HttpOnly 쿠키"
              schema:
                type: "string"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshTokensResponse"
              examples:
                SUCCESS:
                  value:
                    success: true
                    data:
                      message: "토큰이 갱신되었습니다."
                    error: null
      security: []
  /v1/notes/{noteId}:
    get:
      tags:
      - "Notes"
      summary: "노트 조회"
      description: "노트의 기본 정보를 조회한다."
      operationId: "getNote"
      parameters:
      - name: "noteId"
        in: "path"
        description: "노트의 13자리 TSID"
        required: true
        schema:
          type: "string"
          description: "노트의 13자리 TSID"
          nullable: false
          pattern: "^[0-9A-HJKMNP-TV-Z]{13}$"
          minLength: 13
          maxLength: 13
        example: "0HZX2K7M9Q4AF"
      responses:
        "404":
          description: "요청한 리소스를 찾을 수 없음"
