name: Bug
description: Report a reproducible web defect or regression.
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        버그를 재현하고 고치기 위해 필요한 사실, 근거, 검증 상태를 간결하게 작성해주세요.
        AI agent가 작성하는 경우 추측과 확인된 사실을 구분해주세요.
  - type: dropdown
    id: reporter
    attributes:
      label: Reporter
      options:
        - Human
        - Human with AI assistance
        - AI agent
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - App foundation
        - Auth
        - Public pages / navigation
        - Onboarding
        - Dashboard
        - Organization
        - API client
        - API keys
        - Mocks
        - Design / UI
        - Build / CI
        - Other
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: 어떤 문제가 발생했는지 설명해주세요.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: 재현 순서를 적어주세요.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: 스크린샷, 로그, 실패한 명령, 네트워크 응답 등 확인 가능한 근거를 적어주세요.
    validations:
      required: false
  - type: textarea
    id: agent_notes
    attributes:
      label: Agent notes
      placeholder: |
        - Inspected:
        - Commands run:
        - Assumptions / unknowns:
    validations:
      required: false
