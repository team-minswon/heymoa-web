name: Rebuild step
description: Track one planned step in the heymoa-web rebuild sequence.
title: "[Rebuild] "
labels: ["rebuild"]
body:
  - type: markdown
    attributes:
      value: |
        이 템플릿은 기존 main 동작을 참고해 dev 위에서 기능을 다시 쌓는 작업에 사용합니다.
        중간 단계는 완전 동작하지 않아도 되지만, 최종 release 전에는 현재 main과 유사한 동작을 검증해야 합니다.
  - type: dropdown
    id: reporter
    attributes:
      label: Reporter
      options:
        - Human
        - Human with AI assistance
        - AI agent
    validations:
      required: true
  - type: dropdown
    id: stage
    attributes:
      label: Stage
      options:
        - Workflow templates
        - Rebuild roadmap
        - React baseline overlay
        - App foundation
        - Auth shell
        - Public pages and navigation
        - Onboarding flow
        - Dashboard shell
        - Generated API client and fetcher
        - MSW mock backend
        - Organization dashboard pages
        - API key management
        - Final parity verification
    validations:
      required: true
  - type: textarea
    id: current_main_reference
    attributes:
      label: Current main reference
      description: 현재 main에서 참고할 파일, 경로, 커밋, 화면, 동작을 적어주세요.
      placeholder: |
        - Routes:
        - Components:
        - Libs:
        - Current behavior:
    validations:
      required: true
  - type: textarea
    id: rebuild_scope
    attributes:
      label: Rebuild scope
      description: 이번 단계에서 다시 쌓을 범위를 적어주세요.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: 이번 단계가 완료됐다고 판단할 조건을 적어주세요.
      placeholder: |
        - ...
        - 최종 parity에 필요한 기반이 남는다.
    validations:
      required: true
  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
      description: 선행 이슈나 후속 이슈를 적어주세요.
      placeholder: |
        - Depends on:
        - Enables:
    validations:
      required: false
  - type: textarea
    id: diagram
    attributes:
      label: Mermaid diagram
      render: markdown
      placeholder: |
        ```mermaid
        flowchart TD
            A["Previous stage"] --> B["This stage"]
            B --> C["Next stage"]
        ```
    validations:
      required: false
  - type: textarea
    id: verification
    attributes:
      label: Verification
      description: 중간 단계에서 가능한 검증과 최종 parity에서 다시 확인할 항목을 분리해 적어주세요.
      placeholder: |
        - This PR:
        - Final parity:
    validations:
      required: true
  - type: textarea
    id: agent_notes
    attributes:
      label: Agent notes
      placeholder: |
        - Inspected:
        - Commands run:
        - Assumptions / unknowns:
    validations:
      required: false
