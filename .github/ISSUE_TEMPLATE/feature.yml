name: Feature
description: Plan a new user-facing web behavior.
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        구현 방법보다 먼저 사용자 문제, 기대 결과, 완료 기준을 명확히 적어주세요.
        AI agent가 작성하는 경우 확인한 사실과 추정한 내용을 구분해주세요.
  - type: dropdown
    id: reporter
    attributes:
      label: Reporter
      description: 이 이슈를 주로 누가 작성했나요?
      options:
        - Human
        - Human with AI assistance
        - AI agent
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: 가장 가까운 영역을 선택해주세요.
      options:
        - App foundation
        - Auth
        - Public pages / navigation
        - Onboarding
        - Dashboard
        - Organization
        - API client
        - API keys
        - Mocks
        - Design / UI
        - Documentation
        - Other
    validations:
      required: true
  - type: dropdown
    id: rebuild_stage
    attributes:
      label: Rebuild stage
      description: 재구축 로드맵상 어느 단계인가요?
      options:
        - Not part of rebuild
        - Workflow templates
        - Rebuild roadmap
        - React baseline overlay
        - App foundation
        - Auth shell
        - Public pages and navigation
        - Onboarding flow
        - Dashboard shell
        - Generated API client and fetcher
        - MSW mock backend
        - Organization dashboard pages
        - API key management
        - Final parity verification
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem / goal
      description: 어떤 사용자 문제나 제품 목표를 해결하려는 기능인가요?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: 원하는 화면, 흐름, API 연동, 상태 전이를 설명해주세요.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: 완료 여부를 판단할 수 있는 조건을 적어주세요.
      placeholder: |
        - 사용자는 ...
        - 실패 상태에서는 ...
        - 최종 재구축 결과는 현재 main의 해당 동작과 동등하거나 개선된다.
    validations:
      required: true
  - type: textarea
    id: parity
    attributes:
      label: Current-main parity impact
      description: 현재 main과 비교해 유지해야 할 동작, 의도적으로 바꿀 동작, 제거할 동작을 적어주세요.
      placeholder: |
        - Keep:
        - Change:
        - Remove:
    validations:
      required: true
  - type: textarea
    id: non_goals
    attributes:
      label: Non-goals
      description: 이번 이슈에서 하지 않을 일을 적어주세요.
    validations:
      required: false
  - type: textarea
    id: diagram
    attributes:
      label: Mermaid diagram
      description: 흐름이나 의존관계가 있으면 Mermaid로 적어주세요.
      render: markdown
      placeholder: |
        ```mermaid
        flowchart TD
            A["User action"] --> B["Web state"]
            B --> C["API call"]
        ```
    validations:
      required: false
  - type: textarea
    id: agent_notes
    attributes:
      label: Agent notes
      description: AI agent가 작성했다면 조사한 파일, 실행한 명령, 아직 확인하지 못한 가정을 적어주세요.
      placeholder: |
        - Inspected:
        - Commands run:
        - Assumptions / unknowns:
    validations:
      required: false
